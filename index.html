                    </div>

            <!-- Utility features: Save Contact & Share Grid -->
            <div class="utilities-section">
                <button onclick="downloadVCF()" class="btn-main btn-save-contact">

                </button>
                <div class="utility-grid">
                    <button onclick="shareCard()" class="btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                        <span>مشاركة البطاقة</span>
                    </button>
                    <button onclick="openQRModal()" class="btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="7" y1="7" x2="7.01" y2="7"/><line x1="17" y1="7" x2="17.01" y2="7"/><line x1="17" y1="17" x2="17.01" y2="17"/><line x1="7" y1="17" x2="7.01" y2="17"/></svg>

                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Code Glass Modal -->
    <div id="qrModal" class="modal-overlay" onclick="closeQRModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeQRModal(event)">&times;</button>
            <h3>مسح رمز الـ QR</h3>
            <p>امسح الرمز أدناه لفتح البطاقة على هاتف آخر</p>
            <div class="qr-wrapper">
                <img id="qrImage" src="" alt="رمز الاستجابة السريعة">
            </div>
        </div>
    </div>

    <!-- Custom Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Interactive JS Functionality -->
    <script>
        // 3D Tilt Effect
        const card = document.querySelector('.glass-card');
        const container = document.querySelector('.card-container');

        if (window.innerWidth > 768) {
            container.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                
                const angleX = (yc - y) / yc * 8; // Max 8 degrees
                const angleY = (x - xc) / xc * 8;
                
                card.style.transform = `rotateX(${angleX}deg) rotateY(${angleY}deg)`;
                
                // Light glow dynamic reflection position
                const glow = document.querySelector('.card-glow');
                const px = (x / rect.width) * 100;
                const py = (y / rect.height) * 100;
                glow.style.background = `radial-gradient(circle at ${px}% ${py}%, rgba(212, 175, 55, 0.15) 0%, transparent 60%)`;
            });

            container.addEventListener('mouseleave', () => {
                card.style.transform = 'rotateX(0deg) rotateY(0deg)';
                const glow = document.querySelector('.card-glow');
                glow.style.background = 'transparent';
            });
        }

        // Custom Toast Helper
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Download VCF Contact Card
        function downloadVCF() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:محمد الخفاجي
TEL;TYPE=CELL,VOICE:+9647703084383
TEL;TYPE=CELL,VOICE:+9647503772659
EMAIL;TYPE=PREF,INTERNET:mooh80mm@gmail.com
URL:https://www.facebook.com/share/17qd3D1cnK/
NOTE:فصيلة الدم O+
END:VCARD`;
            
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), vcard], { type: 'text/vcard;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'محمد_الخفاجي.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('تم تحميل ملف جهة الاتصال بنجاح!');
        }

        // Share Card Functionality
        function shareCard() {
            if (navigator.share) {
                navigator.share({
                    title: 'محمد الخفاجي - Royal Card',
                    text: 'الملف الشخصي الرقمي لمحمد الخفاجي',
                    url: window.location.href
                }).catch(err => console.log(err));
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showToast('تم نسخ رابط البطاقة إلى الحافظة!');
                }).catch(err => {
                    showToast('فشل نسخ الرابط، يرجى المحاولة يدوياً');
                });
            }
        }

        // QR Code Modal Functions
        function openQRModal() {
            const modal = document.getElementById('qrModal');
            const qrImg = document.getElementById('qrImage');
            
            // Generate QR Code image dynamically using a free fast API
            const currentUrl = window.location.href;
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=d4af37&bgcolor=0a0a0a&data=${encodeURIComponent(currentUrl)}`;
            
            modal.classList.add('active');
        }

        function closeQRModal(e) {
            const modal = document.getElementById('qrModal');
            modal.classList.remove('active');
        }
    </script>
</body>
</html>
